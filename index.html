<!DOCTYPE html>
<html>
<head>
  <title>Habit Builder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 15px;
    }
    h1 {
      text-align: center;
    }
    .card {
      background: white;
      padding: 15px;
      margin-top: 10px;
      border-radius: 10px;
    }
    button {
      padding: 10px;
      margin-top: 5px;
      width: 100%;
      border: none;
      border-radius: 5px;
      background: black;
      color: white;
    }
    input {
      padding: 10px;
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>Habit Builder 🎯</h1>

<div id="stats"></div>

<div style="background:#ddd; border-radius:10px; overflow:hidden; margin-top:10px;">
  <div id="xpBar" style="height:10px; background:black; width:0%"></div>
</div>

<input id="habitInput" placeholder="Enter habit">
<button onclick="addHabit()">Add Habit</button>

<div id="habitList"></div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || {
  habits: [],
  xp: 0,
  level: 1
};

function save() {
  localStorage.setItem("data", JSON.stringify(data));
}

function render() {
  let list = document.getElementById("habitList");
  list.innerHTML = "";

  document.getElementById("stats").innerHTML =
    "Level: " + data.level + " | XP: " + data.xp + "/100";

  let percent = (data.xp / 100) * 100;
  document.getElementById("xpBar").style.width = percent + "%";

  data.habits.forEach((habit, index) => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <h3>${habit.name}</h3>
      <p>Streak: 🔥 ${habit.streak}</p>
      <button onclick="completeHabit(${index})">Complete</button>
    `;
    list.appendChild(div);
  });
}

function addHabit() {
  let input = document.getElementById("habitInput");
  if (input.value === "") return;

  data.habits.push({ name: input.value, streak: 0 });
  input.value = "";
  save();
  render();
}

function completeHabit(index) {
  data.habits[index].streak++;
  data.xp += 10;

  if (data.xp >= 100) {
    data.level++;
    data.xp = 0;
    alert("🔥 Level " + data.level + " reached!");
  }

  save();
  render();
}

render();
</script>

</body>
</html>
